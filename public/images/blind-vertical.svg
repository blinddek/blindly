<svg viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Headrail -->
  <rect x="10" y="10" width="100" height="8" rx="2" stroke="#8B8178" stroke-width="1.5"/>

  <!-- Carrier dots -->
  <circle cx="24" cy="14" r="1.5" stroke="#8B8178" stroke-width="0.75"/>
  <circle cx="37" cy="14" r="1.5" stroke="#8B8178" stroke-width="0.75"/>
  <circle cx="50" cy="14" r="1.5" stroke="#8B8178" stroke-width="0.75"/>
  <circle cx="63" cy="14" r="1.5" stroke="#8B8178" stroke-width="0.75"/>
  <circle cx="76" cy="14" r="1.5" stroke="#8B8178" stroke-width="0.75"/>
  <circle cx="89" cy="14" r="1.5" stroke="#8B8178" stroke-width="0.75"/>
  <circle cx="102" cy="14" r="1.5" stroke="#8B8178" stroke-width="0.75"/>

  <!-- Vane 1 -->
  <g transform="rotate(5, 24, 83)">
    <rect x="18" y="18" width="12" height="130" rx="0.5" stroke="#C4663A" stroke-width="1"/>
    <line x1="24" y1="25" x2="24" y2="140" stroke="#C4663A" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Vane 2 -->
  <g transform="rotate(5, 37, 83)">
    <rect x="31" y="18" width="12" height="130" rx="0.5" stroke="#C4663A" stroke-width="1"/>
    <line x1="37" y1="25" x2="37" y2="140" stroke="#C4663A" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Vane 3 -->
  <g transform="rotate(5, 50, 83)">
    <rect x="44" y="18" width="12" height="130" rx="0.5" stroke="#C4663A" stroke-width="1"/>
    <line x1="50" y1="25" x2="50" y2="140" stroke="#C4663A" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Vane 4 -->
  <g transform="rotate(5, 63, 83)">
    <rect x="57" y="18" width="12" height="130" rx="0.5" stroke="#C4663A" stroke-width="1"/>
    <line x1="63" y1="25" x2="63" y2="140" stroke="#C4663A" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Vane 5 -->
  <g transform="rotate(5, 76, 83)">
    <rect x="70" y="18" width="12" height="130" rx="0.5" stroke="#C4663A" stroke-width="1"/>
    <line x1="76" y1="25" x2="76" y2="140" stroke="#C4663A" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Vane 6 -->
  <g transform="rotate(5, 89, 83)">
    <rect x="83" y="18" width="12" height="130" rx="0.5" stroke="#C4663A" stroke-width="1"/>
    <line x1="89" y1="25" x2="89" y2="140" stroke="#C4663A" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Vane 7 -->
  <g transform="rotate(5, 102, 83)">
    <rect x="96" y="18" width="12" height="130" rx="0.5" stroke="#C4663A" stroke-width="1"/>
    <line x1="102" y1="25" x2="102" y2="140" stroke="#C4663A" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Chain cord -->
  <line x1="108" y1="16" x2="108" y2="50" stroke="#8B8178" stroke-width="0.75" stroke-dasharray="2 2"/>
  <circle cx="108" cy="52" r="2" stroke="#8B8178" stroke-width="0.75"/>
</svg>
