<svg viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Headrail -->
  <rect x="15" y="10" width="90" height="10" rx="2" stroke="#8B8178" stroke-width="1.5"/>

  <!-- Ladder strings -->
  <line x1="30" y1="20" x2="30" y2="148" stroke="#8B8178" stroke-width="0.75" opacity="0.5"/>
  <line x1="90" y1="20" x2="90" y2="148" stroke="#8B8178" stroke-width="0.75" opacity="0.5"/>

  <!-- Slats (9 tilted) -->
  <line x1="18" y1="27" x2="102" y2="33" stroke="#C4663A" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="40" x2="102" y2="46" stroke="#C4663A" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="53" x2="102" y2="59" stroke="#C4663A" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="66" x2="102" y2="72" stroke="#C4663A" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="79" x2="102" y2="85" stroke="#C4663A" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="92" x2="102" y2="98" stroke="#C4663A" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="105" x2="102" y2="111" stroke="#C4663A" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="118" x2="102" y2="124" stroke="#C4663A" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="131" x2="102" y2="137" stroke="#C4663A" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom rail -->
  <rect x="18" y="148" width="84" height="5" rx="1.5" stroke="#C4663A" stroke-width="1.5"/>

  <!-- Tilt wand -->
  <line x1="16" y1="18" x2="16" y2="90" stroke="#8B8178" stroke-width="1"/>
  <circle cx="16" cy="92" r="2.5" stroke="#8B8178" stroke-width="1"/>
</svg>
